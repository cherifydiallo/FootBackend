
spring.application.name=ECMBackend
server.port=${PORT_BACK}
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

# HikariCP connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Database initialization - exécute schema.sql au démarrage
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true


jwt.secret=${JWT_SECRET:mnRs7+aBtuxiYheQsRs1RUg6lUxGo6XTwAtBtCNj5Bw=}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refreshexpiration=${JWT_REFRESHEXPIRATION:104800000}
jwt.backURL=${JWT_BACKURL:http://localhost:8005}


# Logs dans un fichier
logging.file.name=logs/app.log
logging.level.root=INFO
logging.level.com.kratos.commerce=DEBUG

# CORS configuration - comma-separated list of allowed origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8000,http://localhost:8081,http://localhost,http://192.168.1.27,http://ECMSERVER}




