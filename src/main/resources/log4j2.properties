status = warn
name = PropertiesConfig
monitorInterval = 30

# Console Appender
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %c{1} - %msg%n

# File Appender
appender.file.type = File
appender.file.name = FileAppender
appender.file.fileName = logs/app.log
appender.file.append = true
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %c{1} - %msg%n

# Logger for your app (custom package)
logger.kratos.name = com.kratos
logger.kratos.level = debug
logger.kratos.additivity = false
logger.kratos.appenderRefs = console, file
logger.kratos.appenderRef.console.ref = ConsoleAppender
logger.kratos.appenderRef.file.ref = FileAppender

# Root Logger
rootLogger.level = info
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.file.ref = FileAppender
